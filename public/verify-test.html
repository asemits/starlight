<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nebula Firebase Verify Test</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #090b10;
      color: #f2f4f8;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(860px, 100%);
      background: #111520;
      border: 1px solid #2a3142;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.35);
    }
    h1 {
      margin: 0 0 10px;
      font-size: 1.15rem;
      letter-spacing: 0.02em;
    }
    .row {
      display: grid;
      gap: 10px;
      margin-bottom: 10px;
    }
    @media (min-width: 720px) {
      .row.two {
        grid-template-columns: 1fr 1fr;
      }
    }
    input, button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #3a4358;
      background: #0f1320;
      color: #f2f4f8;
      padding: 10px 12px;
      font-size: 14px;
      box-sizing: border-box;
    }
    button {
      cursor: pointer;
      background: #1a2235;
    }
    button:hover { background: #212b42; }
    .buttons {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 10px;
    }
    @media (min-width: 720px) {
      .buttons {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }
    .status {
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #3a4358;
      background: #0c101a;
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      min-height: 42px;
    }
    .log {
      margin-top: 10px;
      background: #0c101a;
      border: 1px solid #3a4358;
      border-radius: 10px;
      padding: 10px;
      min-height: 220px;
      max-height: 45vh;
      overflow: auto;
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Nebula Firebase Email Verification Test</h1>

    <div class="row two">
      <input id="email" type="email" placeholder="Email" autocomplete="email">
      <input id="password" type="password" placeholder="Password" autocomplete="new-password">
    </div>

    <div class="buttons">
      <button id="createBtn" type="button">Create Account</button>
      <button id="loginBtn" type="button">Log In</button>
      <button id="verifyBtn" type="button">Send Verification</button>
      <button id="resendBtn" type="button">Resend Verification</button>
      <button id="reloadBtn" type="button">Reload User</button>
      <button id="whoamiBtn" type="button">Who Am I</button>
      <button id="logoutBtn" type="button">Log Out</button>
      <button id="clearBtn" type="button">Clear Log</button>
    </div>

    <div id="status" class="status">Ready.</div>
    <div id="log" class="log"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script>
    function decodeFirebaseValue(obfuscated) {
      let output = "";
      for (let i = 0; i < obfuscated.length; i += 1) {
        output += String.fromCharCode(obfuscated[i] ^ 73);
      }
      return output;
    }

    const firebaseConfig = {
      apiKey: decodeFirebaseValue([8, 0, 51, 40, 26, 48, 8, 40, 6, 57, 122, 5, 16, 38, 4, 14, 43, 11, 48, 6, 7, 126, 30, 126, 57, 14, 24, 16, 31, 22, 38, 17, 3, 37, 36, 28, 22, 1, 62]),
      authDomain: decodeFirebaseValue([39, 44, 43, 60, 37, 40, 100, 121, 112, 58, 37, 123, 103, 47, 32, 59, 44, 43, 40, 58, 44, 40, 57, 57, 103, 42, 38, 36]),
      projectId: decodeFirebaseValue([58, 61, 40, 59, 37, 32, 46, 33, 61, 100, 123, 113, 44, 125, 121]),
      appId: decodeFirebaseValue([120, 115, 123, 121, 127, 113, 124, 112, 122, 120, 121, 123, 120, 120, 115, 62, 44, 43, 115, 122, 125, 124, 121, 42, 47, 40, 112, 47, 40, 44, 126, 47, 127, 122, 127, 121, 40, 126, 126, 43, 127])
    };

    const app = firebase.apps.length ? firebase.app() : firebase.initializeApp(firebaseConfig);
    const auth = app.auth();

    const statusNode = document.getElementById("status");
    const logNode = document.getElementById("log");
    const emailNode = document.getElementById("email");
    const passwordNode = document.getElementById("password");

    function nowIso() {
      return new Date().toISOString();
    }

    function setStatus(text) {
      statusNode.textContent = text;
    }

    function pushLog(label, data) {
      let payload = "";
      try {
        payload = typeof data === "string" ? data : JSON.stringify(data, null, 2);
      } catch (_e) {
        payload = String(data);
      }
      const line = `[${nowIso()}] ${label}\n${payload}\n\n`;
      logNode.textContent = line + logNode.textContent;
    }

    function actionCodeSettings() {
      return {
        url: new URL("/", window.location.origin).toString(),
        handleCodeInApp: false
      };
    }

    function getCreds() {
      return {
        email: String(emailNode.value || "").trim(),
        password: String(passwordNode.value || "")
      };
    }

    async function sendVerificationWithFallback(user) {
      try {
        await user.sendEmailVerification(actionCodeSettings());
        return { ok: true, mode: "with-action-settings" };
      } catch (e1) {
        pushLog("sendEmailVerification(primary) failed", { code: e1 && e1.code, message: e1 && e1.message });
        try {
          await user.sendEmailVerification();
          return { ok: true, mode: "fallback-no-settings" };
        } catch (e2) {
          return { ok: false, error: e2 || e1 };
        }
      }
    }

    document.getElementById("createBtn").addEventListener("click", async () => {
      const { email, password } = getCreds();
      if (!email || !password) {
        setStatus("Enter email/password first.");
        return;
      }
      try {
        const cred = await auth.createUserWithEmailAndPassword(email, password);
        setStatus("Account created.");
        pushLog("createUserWithEmailAndPassword success", {
          uid: cred && cred.user ? cred.user.uid : null,
          email: cred && cred.user ? cred.user.email : null
        });
      } catch (e) {
        setStatus(`Create failed: ${e.code || "unknown"}`);
        pushLog("createUserWithEmailAndPassword error", { code: e && e.code, message: e && e.message });
      }
    });

    document.getElementById("loginBtn").addEventListener("click", async () => {
      const { email, password } = getCreds();
      if (!email || !password) {
        setStatus("Enter email/password first.");
        return;
      }
      try {
        const cred = await auth.signInWithEmailAndPassword(email, password);
        setStatus("Logged in.");
        pushLog("signInWithEmailAndPassword success", {
          uid: cred && cred.user ? cred.user.uid : null,
          email: cred && cred.user ? cred.user.email : null
        });
      } catch (e) {
        setStatus(`Login failed: ${e.code || "unknown"}`);
        pushLog("signInWithEmailAndPassword error", { code: e && e.code, message: e && e.message });
      }
    });

    async function triggerVerification(label) {
      const user = auth.currentUser;
      if (!user) {
        setStatus("No current user.");
        return;
      }
      const result = await sendVerificationWithFallback(user);
      if (result.ok) {
        setStatus(`Verification sent (${result.mode}).`);
        pushLog(`${label} success`, { mode: result.mode, uid: user.uid, email: user.email });
      } else {
        const e = result.error || {};
        setStatus(`Verification send failed: ${e.code || "unknown"}`);
        pushLog(`${label} error`, { code: e.code, message: e.message, uid: user.uid, email: user.email });
      }
    }

    document.getElementById("verifyBtn").addEventListener("click", async () => {
      try {
        await triggerVerification("sendVerification");
      } catch (e) {
        setStatus(`Verification send failed: ${e.code || "unknown"}`);
        pushLog("sendVerification unexpected error", { code: e && e.code, message: e && e.message });
      }
    });

    document.getElementById("resendBtn").addEventListener("click", async () => {
      try {
        await triggerVerification("resendVerification");
      } catch (e) {
        setStatus(`Resend failed: ${e.code || "unknown"}`);
        pushLog("resendVerification unexpected error", { code: e && e.code, message: e && e.message });
      }
    });

    document.getElementById("reloadBtn").addEventListener("click", async () => {
      const user = auth.currentUser;
      if (!user) {
        setStatus("No current user.");
        return;
      }
      try {
        await user.reload();
        const updated = auth.currentUser;
        setStatus(`Reloaded user. emailVerified=${Boolean(updated && updated.emailVerified)}`);
        pushLog("user.reload success", {
          uid: updated ? updated.uid : null,
          email: updated ? updated.email : null,
          emailVerified: updated ? updated.emailVerified : null
        });
      } catch (e) {
        setStatus(`Reload failed: ${e.code || "unknown"}`);
        pushLog("user.reload error", { code: e && e.code, message: e && e.message });
      }
    });

    document.getElementById("whoamiBtn").addEventListener("click", () => {
      const user = auth.currentUser;
      if (!user) {
        setStatus("No current user.");
        pushLog("currentUser", null);
        return;
      }
      setStatus(`Current user: ${user.email} | verified=${user.emailVerified}`);
      pushLog("currentUser", {
        uid: user.uid,
        email: user.email,
        emailVerified: user.emailVerified,
        providerData: user.providerData
      });
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      try {
        await auth.signOut();
        setStatus("Logged out.");
        pushLog("signOut success", "OK");
      } catch (e) {
        setStatus(`Logout failed: ${e.code || "unknown"}`);
        pushLog("signOut error", { code: e && e.code, message: e && e.message });
      }
    });

    document.getElementById("clearBtn").addEventListener("click", () => {
      logNode.textContent = "";
      setStatus("Log cleared.");
    });

    auth.onAuthStateChanged((user) => {
      if (!user) {
        pushLog("onAuthStateChanged", { user: null });
        return;
      }
      pushLog("onAuthStateChanged", {
        uid: user.uid,
        email: user.email,
        emailVerified: user.emailVerified
      });
    });

    pushLog("firebase init", {
      projectId: firebaseConfig.projectId,
      authDomain: firebaseConfig.authDomain,
      origin: window.location.origin
    });
  </script>
</body>
</html>
