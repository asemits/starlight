<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Starlight</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="logos/logo.png"> 
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/sidebar.css">
</head>
<body class="bg-black text-white">

    <nav class="sidebar" id="sidebar">
      <img src="logos/logo.png" style="width:8%; height:40%; margin-left:10%;">
        <ul>
            <li>
                <a href="/" class="nav-link">
                    <div class="icon"><i class="fa-solid fa-house"></i></div>
                    <span class="text">Home</span>
                </a>
            </li>
            <li>
                <a href="/games" class="nav-link">
                    <div class="icon"><i class="fa-solid fa-gamepad"></i></div>
                    <span class="text">Games</span>
                </a>
            </li>
            <li>
                <a href="/social" class="nav-link">
                    <div class="icon"><i class="fa-solid fa-comments"></i></div>
                    <span class="text">Social</span>
                </a>
            </li>
            <li>
                <a href="/settings" class="nav-link">
                    <div class="icon"><i class="fa-solid fa-cog"></i></div>
                    <span class="text">Settings</span>
                </a>
            </li>
        </ul>
    </nav>

    <div id="app-content" class="p-8 pt-24"></div>

    <script>
        const appContent = document.getElementById('app-content');

        // These keys MUST match the hrefs exactly
        const pages = {
            '/': `<h1 class="text-3xl font-bold">Welcome Home</h1>`,
            '/games': `<h1 class="text-3xl font-bold">Games Section</h1>`,
            '/social': `<h1 class="text-3xl font-bold">Social Dashboard</h1>`,
            '/settings': `<h1 class="text-3xl font-bold">Settings</h1>`,
            '404': `<h1 class="text-3xl font-bold text-red-500">404 - Not Found</h1>`
        };

        function router() {
            const path = window.location.pathname;
            console.log("Current Pathname:", path);
            appContent.innerHTML = pages[path] || pages['404'];
        }

        document.addEventListener('click', (e) => {
            const link = e.target.closest('.nav-link');
            
            if (link) {
                e.preventDefault(); 
                const url = link.getAttribute('href');

                // Update the URL bar
                window.history.pushState({}, '', url);
                
                // Update the content
                router();
            }
        });

        // Listen for back/forward buttons
        window.addEventListener('popstate', router);

        // Initial page load
        window.addEventListener('DOMContentLoaded', router);
    </script>
</body>
</html>
