<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Runner</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: sans-serif;
    }
    .runner-error {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="runner-error" id="runner-status">Loading game...</div>
  <script>
    (async function () {
      const CDN_BASE = "https://cdn.jsdelivr.net/gh/asemits/starlight-games@main/";
      const status = document.getElementById("runner-status");
      const params = new URLSearchParams(window.location.search);
      const gamePath = params.get("path") || "";

      function buildGameInterfaceShim(baseHref) {
        const safeBase = JSON.stringify(baseHref || CDN_BASE);
        return '<script>(function(){if(window.GameInterface&&typeof window.GameInterface.init==="function"){return;}var baseHref=' + safeBase + ';function absoluteUrl(file){try{return new URL(file,baseHref).toString();}catch(_e){return file;}}function loadFiles(files){var list=Array.isArray(files)?files:[files];return list.reduce(function(chain,file){return chain.then(function(){if(!file){return Promise.resolve();}var name=String(file);if(/\.css(\?|#|$)/i.test(name)){return new Promise(function(resolve){var link=document.createElement("link");link.rel="stylesheet";link.href=absoluteUrl(name);link.onload=function(){resolve();};link.onerror=function(){resolve();};document.head.appendChild(link);});}return new Promise(function(resolve){var script=document.createElement("script");script.src=absoluteUrl(name);script.onload=function(){resolve();};script.onerror=function(){resolve();};document.head.appendChild(script);});});},Promise.resolve());}window.GameInterface={init:function(files){return loadFiles(files);},trackEvent:function(){return Promise.resolve();},setGameData:function(){return Promise.resolve();},showInterstitial:function(){return Promise.resolve(false);},showRewarded:function(){return Promise.resolve(false);},gameReady:function(){return Promise.resolve();},gameStart:function(){return Promise.resolve();},gameComplete:function(){return Promise.resolve();},gameOver:function(){return Promise.resolve();},gamePause:function(){return Promise.resolve();},gameResume:function(){return Promise.resolve();},sendScore:function(){return Promise.resolve();},onAudioStateChange:function(){return Promise.resolve();},onMuteStateChange:function(){return Promise.resolve();},onPauseStateChange:function(){return Promise.resolve();},isMuted:function(){return false;},isPaused:function(){return false;}};})();<\/script>';
      }

      if (!gamePath || !/^[A-Za-z0-9 _().,'!+\-]+\.html$/.test(gamePath)) {
        status.textContent = "Invalid game path.";
        return;
      }

      try {
        const sourceUrl = CDN_BASE + encodeURI(gamePath);
        const response = await fetch(sourceUrl, { cache: "no-store" });
        if (!response.ok) {
          status.textContent = "Failed to load game source.";
          return;
        }

        let html = await response.text();
        let effectiveBase = CDN_BASE;
        const baseMatch = html.match(/<base[^>]*href=["']([^"']+)["'][^>]*>/i);
        if (baseMatch && baseMatch[1]) {
          effectiveBase = baseMatch[1];
        } else {
          const baseTag = '<base href="' + CDN_BASE + '">';
          if (/<head[^>]*>/i.test(html)) {
            html = html.replace(/<head([^>]*)>/i, '<head$1>' + baseTag);
          } else {
            html = '<head>' + baseTag + '</head>' + html;
          }
        }

        const shimTag = buildGameInterfaceShim(effectiveBase);
        if (/<head[^>]*>/i.test(html)) {
          html = html.replace(/<head([^>]*)>/i, '<head$1>' + shimTag);
        } else {
          html = '<head>' + shimTag + '</head>' + html;
        }

        const giScriptRegex = /<script[^>]*src=["']([^"']*game-interface\.js[^"']*)["'][^>]*>\s*<\/script>/gi;
        const giMatches = [...html.matchAll(giScriptRegex)];
        for (const match of giMatches) {
          const srcValue = match[1];
          let replacement = '';
          try {
            const resolvedUrl = new URL(srcValue, effectiveBase).toString();
            const giResponse = await fetch(resolvedUrl, { cache: "no-store" });
            if (giResponse.ok) {
              const giCode = await giResponse.text();
              replacement = '<script>' + giCode.replace(/<\/script>/gi, '<\\/script>') + '<\/script>';
            }
          } catch (_error) {
          }
          html = html.replace(match[0], replacement);
        }

        document.open();
        document.write(html);
        document.close();
      } catch (_error) {
        status.textContent = "Unable to start this game right now.";
      }
    })();
  </script>
</body>
</html>
