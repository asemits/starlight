<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Runner</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: #000;
    color: #fff;
    font-family: 'Geist', 'Segoe UI', sans-serif;
    overflow: hidden;
  }

  .runner-error {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    text-align: center;
    padding: 40px;
    gap: 20px;
    position: relative;
    background:
      radial-gradient(ellipse 60% 50% at 50% 40%, rgba(255,255,255,0.03) 0%, transparent 70%);
  }

  .runner-error::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 20%, rgba(255,255,255,0.015) 0%, transparent 55%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(255,255,255,0.01) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .runner-error::after {
    content: '';
    position: fixed;
    inset: -200%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
    opacity: 0.02;
    pointer-events: none;
    mix-blend-mode: overlay;
    z-index: 0;
  }

  .runner-icon {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 0.5px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    position: relative;
    z-index: 1;
    animation: iconPulse 3s ease-in-out infinite;
  }

  .runner-icon::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent, rgba(255,255,255,0.08));
    z-index: -1;
  }

  @keyframes iconPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.0), 0 8px 32px rgba(0,0,0,0.6); }
    50%       { box-shadow: 0 0 0 8px rgba(255,255,255,0.04), 0 12px 40px rgba(0,0,0,0.7); }
  }

  .runner-message {
    font-size: 13px;
    font-weight: 200;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    position: relative;
    z-index: 1;
    animation: fadeIn 0.8s cubic-bezier(0.16,1,0.3,1) forwards;
  }

  .runner-dots {
    display: flex;
    gap: 6px;
    position: relative;
    z-index: 1;
  }

  .runner-dots span {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    animation: dotPulse 1.4s ease-in-out infinite;
  }

  .runner-dots span:nth-child(2) { animation-delay: 0.2s; }
  .runner-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dotPulse {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50%       { opacity: 1;   transform: scale(1.4); }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="runner-error" id="runner-status">
  <div class="runner-icon">◎</div>
  <p class="runner-message" id="runner-text">Loading game</p>
  <div class="runner-dots" id="runner-dots">
    <span></span><span></span><span></span>
  </div>
</div>
  <script>
    (async function () {
      const DEFAULT_CDN_BASE = "https://cdn.jsdelivr.net/gh/PopAnynomous234/Goodboy@main/";
      const ALLOWED_CDN_BASES = [
        "https://cdn.jsdelivr.net/gh/PopAnynomous234/Goodboy@main/",
        "https://cdn.jsdelivr.net/gh/asemits/starlight-games@main/"
      ];
      const status = document.getElementById("runner-status");
      const params = new URLSearchParams(window.location.search);
      const gamePath = params.get("path") || "";
      const requestedBase = params.get("base") || DEFAULT_CDN_BASE;

      function normalizeBase(base) {
        const input = String(base || "").trim().replace(/\/+$/, "") + "/";
        return ALLOWED_CDN_BASES.find((allowed) => allowed === input) || DEFAULT_CDN_BASE;
      }

      const CDN_BASE = normalizeBase(requestedBase);

      function buildGameInterfaceShim(baseHref) {
        const safeBase = JSON.stringify(baseHref || CDN_BASE);
        return '<script>(function(){if(window.GameInterface&&typeof window.GameInterface.init==="function"){return;}var baseHref=' + safeBase + ';function absoluteUrl(file){try{return new URL(file,baseHref).toString();}catch(_e){return file;}}function loadFiles(files){var list=Array.isArray(files)?files:[files];return list.reduce(function(chain,file){return chain.then(function(){if(!file){return Promise.resolve();}var name=String(file);if(/\.css(\?|#|$)/i.test(name)){return new Promise(function(resolve){var link=document.createElement("link");link.rel="stylesheet";link.href=absoluteUrl(name);link.onload=function(){resolve();};link.onerror=function(){resolve();};document.head.appendChild(link);});}return new Promise(function(resolve){var script=document.createElement("script");script.src=absoluteUrl(name);script.onload=function(){resolve();};script.onerror=function(){resolve();};document.head.appendChild(script);});});},Promise.resolve());}window.GameInterface={init:function(files){return loadFiles(files);},trackEvent:function(){return Promise.resolve();},setGameData:function(){return Promise.resolve();},showInterstitial:function(){return Promise.resolve(false);},showRewarded:function(){return Promise.resolve(false);},gameReady:function(){return Promise.resolve();},gameStart:function(){return Promise.resolve();},gameComplete:function(){return Promise.resolve();},gameOver:function(){return Promise.resolve();},gamePause:function(){return Promise.resolve();},gameResume:function(){return Promise.resolve();},sendScore:function(){return Promise.resolve();},onAudioStateChange:function(){return Promise.resolve();},onMuteStateChange:function(){return Promise.resolve();},onPauseStateChange:function(){return Promise.resolve();},isMuted:function(){return false;},isPaused:function(){return false;}};})();<\/script>';
      }

      if (!gamePath || gamePath.includes("..") || !/^[A-Za-z0-9/_ ().,'!+\-]+\.html$/.test(gamePath)) {
        status.textContent = "Invalid game path.";
        return;
      }

function showError(msg) {
        document.getElementById('runner-text').textContent = msg;
        document.getElementById('runner-dots').style.display = 'none';
        document.getElementById('runner-status').querySelector('.runner-icon').textContent = '○';
      }

      try {
        const sourceUrl = CDN_BASE + encodeURI(gamePath);
        const response = await fetch(sourceUrl, { cache: "no-store" });
        if (!response.ok) { showError("Failed to load game source."); return; }

        let html = await response.text();
        let effectiveBase = CDN_BASE;
        const baseMatch = html.match(/<base[^>]*href=["']([^"']+)["'][^>]*>/i);
        if (baseMatch && baseMatch[1]) {
          effectiveBase = baseMatch[1];
        } else {
          const baseTag = '<base href="' + CDN_BASE + '">';
          if (/<head[^>]*>/i.test(html)) {
            html = html.replace(/<head([^>]*)>/i, '<head$1>' + baseTag);
          } else {
            html = '<head>' + baseTag + '</head>' + html;
          }
        }

        const shimTag = buildGameInterfaceShim(effectiveBase);
        if (/<head[^>]*>/i.test(html)) {
          html = html.replace(/<head([^>]*)>/i, '<head$1>' + shimTag);
        } else {
          html = '<head>' + shimTag + '</head>' + html;
        }

        const giScriptRegex = /<script[^>]*src=["']([^"']*game-interface\.js[^"']*)["'][^>]*>\s*<\/script>/gi;
        const giMatches = [...html.matchAll(giScriptRegex)];
        for (const match of giMatches) {
          const srcValue = match[1];
          let replacement = '';
          try {
            const resolvedUrl = new URL(srcValue, effectiveBase).toString();
            const giResponse = await fetch(resolvedUrl, { cache: "no-store" });
            if (giResponse.ok) {
              const giCode = await giResponse.text();
              replacement = '<script>' + giCode.replace(/<\/script>/gi, '<\\/script>') + '<\/script>';
            }
          } catch (_error) {
          }
          html = html.replace(match[0], replacement);
        }

        document.open();
        document.write(html);
        document.close();
      } catch (_error) {
        showError("Unable to start this game right now.");
      }
    })();
  </script>
</body>
</html>
