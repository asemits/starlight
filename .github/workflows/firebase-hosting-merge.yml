name: Deploy to Firebase Hosting
on:
  push:
    branches:
      - main

jobs:
  deploy:
    # GitHub's ubuntu-latest is Debian-based and highly optimized
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # CRITICAL: If site1 fails, site2 and site3 will continue
      matrix:
        # These must match the "target" names in your firebase.json
        firebase_target: [main, site1, site2, site3]

    steps:
      - uses: actions/checkout@v4

      # Faster: Cache npm dependencies so they aren't redownloaded every time
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STARLIGHT_28E40 }}
          projectId: starlight-28e40
          channelId: live
          # This pulls the target name from the matrix above
          target: ${{ matrix.firebase_target }}